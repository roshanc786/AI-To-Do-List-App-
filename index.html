<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Menu</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search tasks...">
            </div>
            <nav>
                <ul id="navLinks">
                    <li class="nav-item active" id="view-today">Today</li>
                    <li class="nav-item" id="view-upcoming">Upcoming</li>
                    <li class="nav-item" id="view-calendar">All Tasks</li>
                </ul>
            </nav>
        </aside>

        <main class="task-section">
            <header>
                <h1 id="viewTitle">TODAY <span>0</span></h1>
                <div class="add-task-box">
                    <input type="text" id="taskInput" placeholder="What needs to be done?">
                    <input type="date" id="taskDate">
                    <button id="addBtn">Add</button>
                </div>
            </header>
            <ul id="taskList"></ul>
        </main>

        <section class="detail-panel">
            <h3>AI Assistant</h3>
            <div class="stats">Done: <span id="completedCount">0</span></div>
            
            <div class="ai-box">
                <p><strong>AI Insight:</strong></p>
                <div id="suggestionBox" class="suggestion-card">
                    Click "AI Fix" on a task or "Summarize" to start!
                </div>
                <button class="ai-btn" onclick="summarizeDay()">Summarize My Day</button>
            </div>

            <div class="footer-actions">
                <button class="clear-link" onclick="clearAll()">Clear All Tasks</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
